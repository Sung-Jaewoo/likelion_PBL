<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아기 사자 자기소개</title>
  <link rel="stylesheet" href="style3.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1>아기 사자 자기소개</h1>
      <p>요약 카드와 상세 자기소개를 한 화면에서 확인할 수 있습니다.</p>
    </header>

    <section class="control-section">
      <button id="addBtn">아기 사자 추가</button>
      <button id="deleteBtn">마지막 아기 사자 삭제</button>
      <span id="countText">총 0명</span>
    </section>

    <section class="form-section">
      <h2>아기 사자 정보 입력</h2>

      <div class="form-grid">
        <div>
          <label for="name">이름</label>
          <input id="name" type="text" placeholder="예: 홍아기사자" />
        </div>

        <div>
          <label for="part">파트</label>
          <select id="part">
            <option value="">파트를 선택하세요</option>
            <option value="Frontend">Frontend</option>
            <option value="Backend">Backend</option>
            <option value="Design">Design</option>
          </select>
        </div>

        <div class="wide">
          <label for="tech">관심 기술 (쉼표로 구분)</label>
          <input id="tech" type="text" placeholder="예: JavaScript, React, HTML/CSS" />
        </div>

        <div class="wide">
          <label for="intro">한 줄 소개 (요약 카드)</label>
          <input id="intro" type="text" placeholder="예: 3주차 DOM 조작 연습 중!" />
        </div>

        <div class="wide">
          <label for="detailIntro">자기소개 (상세 카드)</label>
          <textarea id="detailIntro" placeholder="예: HTML/CSS로 구조를 만들고, JS로 데이터를 바꾸면 화면이 바뀌는 경험을 하고 있습니다."></textarea>
        </div>

        <div>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="예: lion@example.com" />
        </div>

        <div>
          <label for="phone">Phone</label>
          <input id="phone" type="text" placeholder="예: 010-1234-5678" />
        </div>

        <div class="wide">
          <label for="website">Website</label>
          <input id="website" type="url" placeholder="예: https://example.com" />
        </div>

        <div class="wide">
          <label for="comment">한 마디</label>
          <input id="comment" type="text" placeholder="예: 데이터 바꾸면 화면도 바뀐다!" />
        </div>
      </div>

      <div class="form-buttons">
        <button id="submitBtn">추가하기</button>
        <button id="cancelBtn">취소</button>
      </div>
    </section>

    <h2 class="section-title">아기 사자 카드 목록 영역</h2>

    <section class="summary-section">
      <div id="summaryList" class="card-grid"></div>
    </section>

    <section class="detail-section">
      <h2>상세 자기소개</h2>
      <div id="detailList" class="detail-list"></div>
    </section>
  </main>

  <script src="script3.js"></script>
</body>
</html>
