<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아기 사자 자기소개</title>
  <link rel="stylesheet" href="style3.css" />
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1>아기 사자 자기소개</h1>
      <p>요약 카드와 상세 자기소개를 한 화면에서 확인할 수 있습니다.</p>
    </header>

    <section class="control-section">
      <button id="addBtn">아기 사자 추가</button>
      <button id="deleteBtn">마지막 아기 사자 삭제</button>
      <span id="countText">총 0명</span>
    </section>

    <section class="form-section">
      <h2>아기 사자 정보 입력</h2>

      <div class="form-grid">
        <div>
          <label for="name">이름</label>
          <input id="name" type="text" placeholder="이름" />
          <p id="nameError" class="error"></p>
        </div>

        <div>
          <label for="part">소속 파트</label>
          <select id="part">
            <option value="">파트를 선택하세요</option>
            <option value="Frontend">Frontend</option>
            <option value="Backend">Backend</option>
            <option value="Design">Design</option>
          </select>
          <p id="partError" class="error"></p>
        </div>

        <div>
          <label for="grade">학년</label>
          <input id="grade" type="number" placeholder="학년" />
          <p id="gradeError" class="error"></p>
        </div>

        <div>
          <label for="intro">자기소개</label>
          <input id="intro" type="text" placeholder="간단한 자기소개" />
          <p id="introError" class="error"></p>
        </div>

        <div>
          <label for="email">이메일</label>
          <input id="email" type="email" placeholder="example@email.com" />
          <p id="emailError" class="error"></p>
        </div>

        <div>
          <label for="phone">전화번호</label>
          <input id="phone" type="text" placeholder="010-0000-0000" />
          <p id="phoneError" class="error"></p>
        </div>

        <div class="wide">
          <label for="website">웹사이트</label>
          <input id="website" type="url" placeholder="https://example.com" />
          <p id="websiteError" class="error"></p>
        </div>
      </div>
    </section>

    <h2 class="section-title">아기 사자 카드 목록 영역</h2>
    <div style="margin-bottom:20px;">
  <button id="add1">랜덤 1명 추가</button>
  <button id="add5">랜덤 5명 추가</button>
  <button id="reset">전체 새로고침</button>

  <select id="filter">
    <option value="all">전체</option>
    <option value="Frontend">Frontend</option>
    <option value="Backend">Backend</option>
    <option value="Design">Design</option>
  </select>

  <select id="sort">
    <option value="none">정렬 없음</option>
    <option value="asc">이름 오름차순</option>
    <option value="desc">이름 내림차순</option>
  </select>

  <input id="search" placeholder="이름 검색" />
</div>
    <section class="summary-section">
      <div id="summaryList" class="card-grid"></div>
    </section>

    <section class="detail-section">
      <h2>상세 자기소개</h2>
      <div id="detailList" class="detail-list"></div>
    </section>
  </main>

  <script src="script3.js"></script>
</body>
</html>
