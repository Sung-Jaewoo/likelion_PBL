<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아기 사자 대시보드</title>
  <link rel="stylesheet" href="./style4.css" />
</head>
<body>
  <header>
    <h1>아기 사자 대시보드</h1>
    <p>외부 API 데이터를 불러와 명단을 렌더링합니다.</p>
  </header>

  <main>
    <section class="control-panel">
      <button id="loadBtn">랜덤 1명 추가</button>
      <button id="loadFiveBtn">랜덤 5명 추가</button>
      <button id="loadAllBtn">전체 새로고침</button>
    </section>

    <section class="form-section">
      <h2>아기 사자 직접 추가</h2>

      <form id="lionForm">
        <input id="nameInput" type="text" placeholder="이름" required />
        <select id="partInput" required>
          <option value="">파트 선택</option>
          <option value="Frontend">Frontend</option>
          <option value="Backend">Backend</option>
          <option value="Design">Design</option>
        </select>
        <input id="emailInput" type="email" placeholder="이메일" required />
        <button type="submit">추가하기</button>
      </form>
    </section>

    <section class="filter-section">
      <h2>보기 옵션</h2>

      <div class="filters">
        <select id="partFilter">
          <option value="all">전체 파트</option>
          <option value="Frontend">Frontend</option>
          <option value="Backend">Backend</option>
          <option value="Design">Design</option>
        </select>

        <select id="sortSelect">
          <option value="default">정렬 없음</option>
          <option value="name">이름순</option>
        </select>

        <input id="searchInput" type="text" placeholder="이름 검색" />
      </div>
    </section>

    <section class="status-section">
      <p id="statusText">아직 데이터를 불러오지 않았습니다.</p>
    </section>

    <section id="cardList" class="card-list"></section>
  </main>

  <script src="./script4.js"></script>
</body>
</html>
